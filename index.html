const KEY_STORAGE="mediscript_api_key";

// ── IMAGE URL ──
function getImageUrl(prompt,rasio,seed){
  const w=rasio==="9:16"?576:1024,h=rasio==="9:16"?1024:576;
  const s=seed||Math.floor(Math.random()*99999);
  return `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=${w}&height=${h}&seed=${s}&nologo=true&enhance=true`;
}

function detectProduk(topik){

  for(const[k,v]of Object.entries(PRODUK_DB))if(l.includes(k))return v;

}

// ── GEMINI API ──
async function callGemini(apiKey,systemPrompt,userPrompt,onChunk){
  if(!apiKey||apiKey.trim()==="")
    throw new Error("API Key belum diisi! Klik tombol ⚙️ API Key di pojok kanan atas.");
  const endpoint=`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:streamGenerateContent?alt=sse&key=${apiKey.trim()}`;
  const resp=await fetch(endpoint,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      systemInstruction:{parts:[{text:systemPrompt}]},
      contents:[{role:"user",parts:[{text:userPrompt}]}],
      generationConfig:{maxOutputTokens:4000,temperature:0.85,topP:0.95}
    })
  });
  if(!resp.ok){const e=await resp.text();throw new Error(`Gemini API Error ${resp.status}: ${e.slice(0,200)}`);}
  const reader=resp.body.getReader(),dec=new TextDecoder();
  let full="";
  while(true){
    const{done,value}=await reader.read();if(done)break;
    for(const line of dec.decode(value).split("\n")){
      if(line.startsWith("data: ")){
        try{const d=JSON.parse(line.slice(6));const t=d?.candidates?.[0]?.content?.parts?.[0]?.text;if(t){full+=t;onChunk(full);}}catch{}
      }
    }
  }
  return full;
}

function parseResult(raw){
  try{const clean=raw.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();const m=clean.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0]);}catch{}
  return null;
}

// ── PROMPT BUILDERS ──
function buildEduPrompt(form){
  const rasioTxt=form.rasio==="9:16"?"vertikal 9:16 (TikTok/Reels/Shorts) portrait":"horizontal 16:9 (YouTube/LinkedIn) landscape";
  const ssBlock=form.softSelling
    ?`\nSOFT SELLING AKTIF:\n- Produk: ${form.deskripsiProduk||"Produk herbal kesehatan"}\n- Penempatan: ${form.penempatanProduk}\n- Masukkan produk di 2 scene terakhir secara natural\n- Ratio narasi: ${form.focusRatio}% edukasi / ${100-form.focusRatio}% produk`
    :"\n- Mode: Murni edukasi (tanpa soft selling)";
  return{
    system:`Kamu adalah scriptwriter profesional konten edukasi kesehatan video pendek viral. Buat script yang akurat secara medis, menarik, dan sesuai platform. Output HANYA JSON valid. Tidak ada teks di luar JSON. Tidak ada markdown code block.`,
    user:`Buat script video edukasi kesehatan:\nTOPIK: ${form.namaPenyakit}\nTIPE VISUAL: ${form.tipeVisual}\nLINGKUNGAN: ${form.lingkungan||"Studio medis modern"}\nNADA: ${form.nadaEdukasi}\nTARGET AUDIENS: ${form.targetAudiens}\nBAHASA: ${form.bahasa}\nDURASI: ${form.durasi} detik\nNARATOR: ${form.narator}\nPLATFORM: ${form.platform}\nRASIO VIDEO: ${rasioTxt}\nKONTEKS: ${form.konteksTambahan||"5W 1H — penyebab, gejala, pencegahan, penanganan"}${ssBlock}\n\nOutput JSON:\n{\n  "judul": "Judul konten viral menarik",\n  "hook": "Kalimat pembuka 3 detik yang bikin stop scrolling",\n  "scenes": [\n    {\n      "scene_number": 1,\n      "durasi_detik": 5,\n      "narasi": "Teks yang dibacakan narator",\n      "visual_description": "Deskripsi visual/animasi medis yang tampil",\n      "teks_overlay": "Teks pendek di layar (max 10 kata)",\n      "i2v_prompt": "Prompt bahasa Inggris sangat detail untuk AI video/image generator. Hyper-realistic, cinematic, professional medical visual, ${form.rasio==="9:16"?"vertical 9:16 portrait framing":"horizontal 16:9 landscape framing"}, 4K quality, dramatic lighting"\n    }\n  ],\n  "cta": "Call to action penutup yang mengajak penonton",\n  "hashtags": ["#tag1","#tag2","#tag3","#tag4","#tag5"],\n  "caption": "Caption lengkap dan menarik untuk posting di ${form.platform}"\n}`
  };
}

function buildObjPrompt(form){
  const rasioTxt=form.rasio==="9:16"?"vertikal 9:16 portrait":"horizontal 16:9 landscape";
  const ssBlock=form.softSelling
    ?`\nSOFT SELLING di scene akhir:\n- Produk: ${form.deskripsiProduk||"Produk kesehatan"}\n- Penempatan: ${form.penempatanProduk}`
    :"\n- Tanpa soft selling";
  return{
    system:`Kamu adalah kreator konten viral Object Talk bergaya @brainhazards. Buat script dramatis dengan visual 3D sinematik yang membangun suspense scene per scene. Output HANYA JSON valid. Tidak ada teks di luar JSON.`,
    user:`Buat Object Talk script:\nTOPIK: ${form.topik}\nHOOK STYLE: ${form.hookStyle}\nVISUAL 3D: ${form.tipeVisual3D}\nNADA: ${form.nada}\nBAHASA: ${form.bahasa}\nWARNA TEKS: ${form.warnaTeks}\nJUMLAH SCENE: ${form.jumlahScene}\nPLATFORM: ${form.platform}\nRASIO: ${rasioTxt}${ssBlock}\n\nOutput JSON:\n{\n  "judul": "Judul provokatif pakai tanda kutip dramatis",\n  "hook_teks": "Hook pembuka — mengejutkan, max 10 kata",\n  "scenes": [\n    {\n      "scene_number": 1,\n      "durasi_detik": 3,\n      "teks_overlay": "Kalimat pendek dramatis max 10 kata",\n      "narasi_vo": "Narasi yang dibacakan voice over",\n      "visual_3d": "Deskripsi visual 3D sinematik yang tampil",\n      "i2v_prompt": "Prompt Inggris hyper-detailed untuk AI image/video generator. Cinematic 3D medical animation, ultra-realistic, dramatic lighting, ${form.rasio==="9:16"?"vertical 9:16 portrait":"horizontal 16:9 landscape"}, 4K, dark atmospheric background, glowing biological elements"\n    }\n  ],\n  "pesan_inti": "Pesan utama/resolusi mengejutkan 1-2 kalimat",\n  "caption": "Caption Instagram/TikTok hook kuat di baris pertama",\n  "hashtags": ["#tag1","#tag2","#tag3","#tag4","#tag5"]\n}`
  };
}

// ── BASE STYLES ──
const S={
  card:{background:"linear-gradient(135deg,#0f0f28,#0c0c22)",border:"1px solid #1e1e48",borderRadius:16,padding:22},
  label:{color:"#6060a0",fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:7},

};

// ── KOMPONEN ──
function Field({label,children,hint}){
  return <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <label style={S.label}>{label}</label>
      {hint&&<span style={{color:"#3a3a70",fontSize:10}}>{hint}</span>}
    </div>
    {children}
  </div>;
}

function Chip({active,onClick,children,color="#00e5a0",size="normal"}){
  const pad=size==="sm"?"4px 10px":"6px 14px";
  const fs=size==="sm"?11:12;
  return <button onClick={onClick} style={{padding:pad,borderRadius:20,border:`1px solid ${active?color:"#1e1e48"}`,background:active?`${color}1a`:"transparent",color:active?color:"#4a4a80",fontSize:fs,cursor:"pointer",fontWeight:700,fontFamily:"inherit",transition:"all .2s"}}>{children}</button>;
}

function Toggle({value,onChange,color}){
  return <div onClick={()=>onChange(!value)} style={{width:46,height:26,borderRadius:13,background:value?color:"#1a1a3e",position:"relative",transition:"background .3s",flexShrink:0,cursor:"pointer",boxShadow:value?`0 0 12px ${color}60`:"inset 0 1px 3px rgba(0,0,0,.5)"}}>
    <div style={{width:20,height:20,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:value?23:3,transition:"left .3s",boxShadow:"0 1px 4px rgba(0,0,0,.4)"}}/>
  </div>;
}

function ImageUploadProduk({value,onChange,color="#00e5a0"}){
  const ref=useRef();
  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{const b64=ev.target.result.split(",")[1];onChange({data:b64,type:file.type,preview:ev.target.result,name:file.name});};
    reader.readAsDataURL(file);
  };
  return <div>
    <input ref={ref} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
    {value
      ?<div style={{display:"flex",alignItems:"center",gap:12,background:"#08081e",border:`1px solid ${color}40`,borderRadius:12,padding:"10px 14px"}}>
        <img src={value.preview} alt="produk" style={{width:56,height:56,objectFit:"cover",borderRadius:10,border:`2px solid ${color}40`,boxShadow:`0 0 12px ${color}30`}}/>
        <div style={{flex:1}}>
          <div style={{color:"#e2e2ff",fontSize:12,fontWeight:700,marginBottom:3}}>{value.name}</div>
          <div style={{color,fontSize:11}}>✅ Foto produk siap — AI akan kenali visual ini</div>
        </div>
        <button onClick={()=>onChange(null)} style={{background:"rgba(255,60,60,.12)",color:"#ff7070",border:"1px solid rgba(255,60,60,.25)",borderRadius:8,padding:"5px 12px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Hapus</button>
      </div>
      :<button onClick={()=>ref.current.click()} style={{width:"100%",background:`${color}06`,border:`2px dashed ${color}30`,borderRadius:12,padding:"18px",color:`${color}cc`,fontSize:13,cursor:"pointer",fontFamily:"inherit",fontWeight:700,transition:"all .2s",display:"flex",flexDirection:"column",alignItems:"center",gap:6}}
        onMouseEnter={e=>{e.currentTarget.style.background=`${color}10`;e.currentTarget.style.borderColor=`${color}50`;}}
        onMouseLeave={e=>{e.currentTarget.style.background=`${color}06`;e.currentTarget.style.borderColor=`${color}30`;}}>
        <span style={{fontSize:28}}>📷</span>
        <span>Upload Foto Produk</span>
        <span style={{fontSize:11,fontWeight:400,color:"#3a3a70"}}>Opsional — AI kenali visual untuk i2v prompt scene akhir</span>
      </button>}
  </div>;
}

function SoftSellBlock({form,setForm,color,topikKey}){
  const set=k=>v=>setForm(f=>({...f,[k]:v}));
  const handleToggle=val=>{
    setForm(f=>{
      const next={...f,softSelling:val};
      if(val&&f[topikKey]){const s=detectProduk(f[topikKey]);if(s&&!f.deskripsiProduk){next.deskripsiProduk=s.deskripsi;next._namaProdukSaran=s.nama;}}
      return next;
    });
  };
  const isOn=form.softSelling;
  return <div style={{background:"linear-gradient(135deg,#0f0f28,#0c0c22)",border:`1px solid ${isOn?color+"40":"#1e1e48"}`,borderRadius:16,padding:20,transition:"all .3s",boxShadow:isOn?`0 0 20px ${color}12`:""inset 0 1px 0 rgba(255,255,255,.03)""}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>handleToggle(!isOn)}>
        <Toggle value={isOn} onChange={handleToggle} color={color}/>
        <div>
          <div style={{color:isOn?color:"#4a4a80",fontWeight:700,fontSize:14}}>🛒 Fitur Soft Selling</div>
          <div style={{color:"#3a3a70",fontSize:11,marginTop:2}}>{isOn?"Produk disebut natural dalam edukasi":"Murni konten edukasi"}</div>
        </div>
      </div>
      {isOn&&<span style={{background:`${color}15`,color,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>AKTIF</span>}
    </div>
    {isOn&&<div style={{marginTop:18,display:"flex",flexDirection:"column",gap:14,paddingTop:16,borderTop:`1px solid ${color}20`}}>
      {form._namaProdukSaran&&<div style={{background:`${color}0e`,border:`1px solid ${color}25`,borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><span style={{color,fontSize:11,fontWeight:700}}>💡 Saran produk otomatis: </span><span style={{color:"#c0c0e0",fontSize:12,fontWeight:700}}>{form._namaProdukSaran}</span></div>
        <button onClick={()=>setForm(f=>({...f,_namaProdukSaran:"",deskripsiProduk:""}))} style={{background:"transparent",border:"none",color:"#4a4a80",fontSize:14,cursor:"pointer"}}>✕</button>
      </div>}
      <Field label="📦 Nama & Deskripsi Produk">
        <textarea style={S.textarea} value={form.deskripsiProduk} onChange={e=>set("deskripsiProduk")(e.target.value)} placeholder="Contoh: HerbalGluco Plus — suplemen ekstrak pare & kayu manis untuk menjaga kadar gula darah..." rows={2}/>
      </Field>
      <Field label="📷 Foto Produk" hint="Opsional">
        <ImageUploadProduk value={form.fotoProduk} onChange={set("fotoProduk")} color={color}/>
      </Field>
      <div>
        <label style={S.label}>🎬 Penempatan Produk di Scene Akhir</label>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
          {["Subjek memegang produk","Produk di atas meja","Close-up produk sinematik"].map(o=><Chip key={o} active={form.penempatanProduk===o} onClick={()=>set("penempatanProduk")(o)} color={color}>{o}</Chip>)}
        </div>
      </div>
      <div>
        <label style={S.label}>🎯 Porsi Narasi</label>
        <div style={{display:"flex",alignItems:"center",gap:14,marginTop:6}}>
          <span style={{color,fontSize:12,fontWeight:700,minWidth:100}}>{form.focusRatio}% Edukasi</span>
          <input type="range" min={40} max={90} value={form.focusRatio} onChange={e=>set("focusRatio")(Number(e.target.value))} style={{accentColor:color,flex:1}}/>
          <span style={{color:"#6080ff",fontSize:12,fontWeight:700,minWidth:90}}>{100-form.focusRatio}% Produk</span>
        </div>
        <div style={{height:4,borderRadius:2,marginTop:6,background:`linear-gradient(to right,${color} ${form.focusRatio}%,#6080ff ${form.focusRatio}%)`}}/>
      </div>
    </div>}
  </div>;
}

// ── SCENE IMAGE CARD ──
function SceneImageCard({prompt,rasio,sceneNum,accent}){
  const [status,setStatus]=useState("loading");
  const [seed]=useState(()=>Math.floor(Math.random()*99999));
  const imgUrl=getImageUrl(prompt,rasio,seed);
  const isPortrait=rasio==="9:16";
  const imgW=isPortrait?150:240,imgH=isPortrait?240:150;
  return(
    <div className="fadein" style={{background:"#07071a",border:`1px solid ${accent}25`,borderRadius:12,overflow:"hidden",display:"flex",flexDirection:"column",width:imgW+2,flexShrink:0}}>
      <div style={{padding:"6px 10px",background:`${accent}12`,borderBottom:`1px solid ${accent}15`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:accent,fontSize:10,fontWeight:800,letterSpacing:1}}>📸 Scene {sceneNum}</span>
        {status==="ready"&&<button onClick={()=>window.open(imgUrl,"_blank")} title="Buka di tab baru" style={{background:"transparent",border:"none",color:accent,fontSize:11,cursor:"pointer",padding:0}}>⬇️</button>}
      </div>
      <div style={{position:"relative",width:imgW,height:imgH,flexShrink:0}}>
        {status==="loading"&&<div className="shimmer" style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>
          <div style={{width:24,height:24,border:`2px solid ${accent}40`,borderTop:`2px solid ${accent}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
          <span style={{color:"#4040a0",fontSize:9,fontWeight:600}}>Generating...</span>
        </div>}
        {status==="error"&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,background:"#0c0c22"}}>
          <span style={{fontSize:20}}>🔄</span>
          <button onClick={()=>setStatus("loading")} style={{background:`${accent}15`,color:accent,border:`1px solid ${accent}30`,borderRadius:6,padding:"3px 10px",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>Coba Lagi</button>
        </div>}
        <img src={imgUrl} alt={`Scene ${sceneNum}`} style={{width:"100%",height:"100%",objectFit:"cover",display:status==="ready"?"block":"none"}} onLoad={()=>setStatus("ready")} onError={()=>setStatus("error")}/>
      </div>
      <div style={{padding:"5px 10px",borderTop:`1px solid ${accent}10`}}>
        <div style={{color:"#2a2a60",fontSize:9,lineHeight:1.4}}>
          {status==="ready"?"✅ Siap untuk I2V":status==="error"?"⚠️ Gagal load":"⏳ Memuat..."}
        </div>
      </div>
    </div>
  );
}

// ── RESULT PANEL ──
function ResultPanel({result,mode,rasio}){
  const [tab,setTab]=useState("prompts");
  const [copied,setCopied]=useState(null);
  const [showImgs,setShowImgs]=useState(true);
  const parsed=parseResult(result);
  const accent=mode==="eduhealth"?"#00e5a0":"#f5c518";
  const copy=(txt,k)=>{navigator.clipboard.writeText(txt);setCopied(k);setTimeout(()=>setCopied(null),2500);};

  const exportTxt=()=>{
    if(!parsed)return;
    let t=`=== MEDISCRIPT AI v3 ===\n\nJUDUL: ${parsed.judul}\nHOOK: ${parsed.hook||parsed.hook_teks}\n\n`;
    parsed.scenes?.forEach(s=>{
      t+=`--- Scene ${s.scene_number} (${s.durasi_detik}s) ---\n`;
      t+=`Narasi: ${s.narasi||s.narasi_vo}\n`;
      if(s.teks_overlay)t+=`Overlay: ${s.teks_overlay}\n`;
      if(s.visual_description||s.visual_3d)t+=`Visual: ${s.visual_description||s.visual_3d}\n`;
      t+=`I2V Prompt: ${s.i2v_prompt}\n\n`;
    });
    if(parsed.cta)t+=`CTA: ${parsed.cta}\n\n`;

    t+=`Caption:\n${parsed.caption}\n\nHashtag: ${parsed.hashtags?.join(" ")}`;
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([t],{type:"text/plain;charset=utf-8"}));
    a.download=`mediscript_${Date.now()}.txt`;a.click();
  };

  const copyAll=()=>{
    if(!parsed)return;
    let t=`${parsed.judul}\n\n${parsed.hook||parsed.hook_teks}\n\n`;

}

// ── OBJECT TALK FORM ──
function ObjectTalkForm({apiKey}){
  const [form,setForm]=useState({
    topik:"",hookStyle:"Provokatif",tipeVisual3D:"Animasi Otak 3D & Neuron",
    nada:"Dramatis & Mengejutkan",bahasa:"Indonesia",warnaTeks:"Kuning Bold (#F5C518)",jumlahScene:"6",
    softSelling:false,deskripsiProduk:"",_namaProdukSaran:"",focusRatio:80,fotoProduk:null,penempatanProduk:"Produk di atas meja",
    rasio:"9:16",platform:"TikTok"
  });
  const [loading,setLoading]=useState(false);
  const [stream,setStream]=useState("");
  const [result,setResult]=useState(null);
  const [err,setErr]=useState(null);
  const set=k=>v=>setForm(f=>({...f,[k]:v}));
  const go=async()=>{
    if(!form.topik.trim()){setErr("Masukkan topik terlebih dahulu!");return;}
    setLoading(true);setErr(null);setResult(null);setStream("");
    try{const{system,user}=buildObjPrompt(form);setResult(await callGemini(apiKey,system,user,setStream));}
    catch(e){setErr(e.message);}
    setLoading(false);
  };
  return <div style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{background:"rgba(245,197,24,.05)",border:"1px solid rgba(245,197,24,.18)",borderRadius:12,padding:"12px 16px"}}>
      <div style={{color:"#f5c518",fontWeight:700,fontSize:13}}>🧠 Object Talk — Gaya @brainhazards</div>
      <div style={{color:"#3a3a70",fontSize:12,marginTop:3}}>Visual 3D sinematik dramatis + teks overlay + foto otomatis per scene</div>
    </div>
    <Field label="🧠 Topik / Fakta Kesehatan" hint="Wajib diisi">
      <textarea style={S.textarea} value={form.topik} onChange={e=>set("topik")(e.target.value)} rows={3} placeholder="Contoh: Otakmu menjadi kotor setiap hari dan tidur adalah satu-satunya cara membersihkannya..."/>
    </Field>
    <div>
      <label style={S.label}>🪝 Gaya Hook</label>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
        {["Provokatif","Pertanyaan Retoris","Fakta Mengejutkan"].map(o=><Chip key={o} active={form.hookStyle===o} onClick={()=>set("hookStyle")(o)} color="#f5c518">{o}</Chip>)}
      </div>
    </div>
    <div>
      <label style={S.label}>🎭 Nada</label>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
        {["Dramatis & Mengejutkan","Edukatif & Tenang","Dark & Mysterious"].map(o=><Chip key={o} active={form.nada===o} onClick={()=>set("nada")(o)} color="#f5c518">{o}</Chip>)}
      </div>
    </div>
    <Field label="🎨 Tipe Visual 3D">
      <select style={S.select} value={form.tipeVisual3D} onChange={e=>set("tipeVisual3D")(e.target.value)}>
        {["Animasi Otak 3D & Neuron","Animasi Sel Darah & Pembuluh","Animasi Organ Internal","Animasi DNA & Molekul","Animasi Sistem Saraf","Animasi Tulang & Sendi"].map(o=><option key={o}>{o}</option>)}
      </select>
    </Field>
    <SoftSellBlock form={form} setForm={setForm} color="#f5c518" topikKey="topik"/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <Field label="🎨 Warna Teks Overlay">
        <select style={S.select} value={form.warnaTeks} onChange={e=>set("warnaTeks")(e.target.value)}>
          {["Kuning Bold (#F5C518)","Putih Bold (#FFFFFF)","Merah Bold (#FF4444)","Hijau Neon (#00FF80)"].map(o=><option key={o}>{o}</option>)}
        </select>
      </Field>
      <Field label="🎬 Jumlah Scene">
        <select style={S.select} value={form.jumlahScene} onChange={e=>set("jumlahScene")(e.target.value)}>
          {["4","6","8","10"].map(o=><option key={o} value={o}>{o} Scene (~{o*3}s)</option>)}
        </select>
      </Field>
      <Field label="🌐 Bahasa">
        <select style={S.select} value={form.bahasa} onChange={e=>set("bahasa")(e.target.value)}>
          {["Indonesia","English","Melayu"].map(o=><option key={o}>{o}</option>)}
        </select>
      </Field>
      <Field label="📱 Platform">
        <select style={S.select} value={form.platform} onChange={e=>set("platform")(e.target.value)}>
          {["TikTok","Instagram Reels","YouTube Shorts","YouTube"].map(o=><option key={o}>{o}</option>)}
        </select>
      </Field>
      <div style={{gridColumn:"1/-1"}}>
        <label style={S.label}>📐 Rasio Video</label>
        <div style={{display:"flex",gap:8,marginTop:4}}>
          <Chip active={form.rasio==="9:16"} onClick={()=>set("rasio")("9:16")} color="#f5c518">📱 9:16 Vertikal</Chip>
          <Chip active={form.rasio==="16:9"} onClick={()=>set("rasio")("16:9")} color="#f5c518">🖥️ 16:9 Horizontal</Chip>
        </div>
      </div>
    </div>
    {err&&<div style={{background:"rgba(255,80,80,.08)",border:"1px solid rgba(255,80,80,.25)",borderRadius:10,padding:"10px 14px",color:"#ff8080",fontSize:13}}>⚠️ {err}</div>}
    <button onClick={go} disabled={loading} style={{background:loading?"#1a1200":"linear-gradient(135deg,#f5c518,#ff8c00)",border:"none",borderRadius:14,padding:"16px 24px",color:loading?"#4a3800":"#050300",fontSize:15,fontWeight:900,cursor:loading?"not-allowed":"pointer",fontFamily:"inherit",transition:"all .2s",boxShadow:loading?"":"0 4px 24px rgba(245,197,24,.3)"}}>
      {loading?"🧠 Sedang Generate Script...":"🧠 GENERATE SCRIPT SEKARANG"}
    </button>
    {loading&&stream&&<div style={S.card}>
      <div style={{color:"#f5c518",fontSize:11,fontWeight:700,marginBottom:6}}>🔄 Streaming dari Gemini AI...</div>
      <div style={{color:"#3a3a70",fontSize:11,fontFamily:"monospace",maxHeight:80,overflow:"hidden"}}>{stream.slice(-300)}</div>
    </div>}
    {result&&!loading&&<ResultPanel result={result} mode="objecttalk" rasio={form.rasio}/>}
  </div>;
}
